server:
  port: 8083

spring:
  application:
    name: email-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

rabbitmq:
  exchange: wallet.email
  queue: email.notifications
  routing-key: email.notification
  dead-letter-exchange: wallet.email.dlx
  dead-letter-queue: email.notifications.dlq
  dead-letter-routing-key: email.notification.dead

logging:
  level:
    org.side_project.email_service: INFO
