server:
  # Trust X-Forwarded-* headers from reverse proxies (ngrok, load balancers)
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        # Set secure: true when deploying behind HTTPS
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  application:
    name: wallet_system
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  messages:
    basename: messages
    encoding: UTF-8
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.side_project.wallet_system: INFO
  file:
    name: logs/wallet-system.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  upload:
    dir: uploads
  base-url: "http://localhost:8080"

mock-bank:
  url: "http://localhost:8081"

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

withdraw:
  webhook-secret: ${WITHDRAW_WEBHOOK_SECRET}

sbpayment:
  merchant-id: ${PAYMENT_MERCHANT_ID}
  service-id: ${PAYMENT_SERVICE_ID}
  hash-key: ${PAYMENT_HASH_KEY}
  gateway-url: "https://stbfep.sps-system.com/Extra/BuyRequestAction.do"
  base-url: "https://puzzle-mooing-compress.ngrok-free.dev"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha