server:
  # Trust X-Forwarded-* headers from reverse proxies (ngrok, load balancers)
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        # Set secure: true when deploying behind HTTPS
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  application:
    name: wallet_system
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  messages:
    basename: messages
    encoding: UTF-8
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.side_project.wallet_system: INFO
  file:
    name: logs/wallet-system.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  upload:
    dir: uploads
  base-url: "http://localhost:8080"
  test-email: "test1234@gmail.com"
  test-fixed-otp: "123456"
  test-password: "test1234"


mock-bank:
  url: "http://localhost:8081"

withdraw:
  webhook-secret: ${WITHDRAW_WEBHOOK_SECRET}

payment:
  service:
    base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8082}

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET}

rabbitmq:
  exchange: wallet.email
  queue: email.notifications
  routing-key: email.notification
  dead-letter-exchange: wallet.email.dlx
  dead-letter-routing-key: email.notification.dead

resilience4j:
  circuitbreaker:
    instances:
      mockBankWithdraw:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        register-health-indicator: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha