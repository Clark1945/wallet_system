<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{profile.title}">My Profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; color: #333; }

        /* ── Header ── */
        header { background: #4f46e5; color: #fff; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; }
        .header-nav { display: flex; align-items: center; gap: 1rem; }
        .header-nav a { color: #fff; font-size: .9rem; opacity: .85; text-decoration: none; }
        .header-nav a:hover { opacity: 1; }
        .header-nav span { font-size: .9rem; opacity: .85; }
        .logout-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4);
            color: #fff; padding: .4rem .9rem; border-radius: 4px; cursor: pointer; font-size: .85rem; }
        .logout-btn:hover { background: rgba(255,255,255,.35); }

        main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

        /* ── Alert ── */
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: .9rem; }
        .alert-error   { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8e8; color: #27ae60; }

        /* ── Profile card ── */
        .profile-card { background: #fff; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 2rem; margin-bottom: 1.5rem; }
        .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        @media (max-width: 640px) { .profile-grid { grid-template-columns: 1fr; } }

        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem;
            padding-bottom: .5rem; border-bottom: 1px solid #eee; }

        /* ── Avatar ── */
        .avatar-wrap { display: flex; flex-direction: column; align-items: center; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid #e5e7eb; }
        .avatar-placeholder { width: 120px; height: 120px; border-radius: 50%;
            background: #e5e7eb; display: flex; align-items: center; justify-content: center;
            color: #9ca3af; font-size: 3rem; }
        .avatar-form { margin-top: 1rem; text-align: center; width: 100%; }
        .avatar-form input[type="file"] { display: block; width: 100%; font-size: .82rem;
            margin-bottom: .6rem; }
        .hint { font-size: .75rem; color: #9ca3af; margin-top: .4rem; }

        /* ── Field group ── */
        .field-group { margin-bottom: 1rem; }
        .field-group label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
        .field-group input[type="text"],
        .field-group input[type="tel"],
        .field-group input[type="date"],
        .field-group textarea {
            width: 100%; padding: .55rem .7rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: .95rem; }
        .field-group textarea { resize: vertical; }
        .field-readonly { padding: .55rem .7rem; background: #f3f4f6; color: #6b7280;
            border: 1px solid #e5e7eb; border-radius: 4px; font-size: .95rem; }

        /* ── Buttons ── */
        .btn-primary { background: #4f46e5; color: #fff; border: none; border-radius: 4px;
            padding: .6rem 1.5rem; font-size: .9rem; cursor: pointer; }
        .btn-primary:hover { background: #4338ca; }
        .btn-avatar { width: 100%; padding: .55rem; background: #4f46e5; color: #fff;
            border: none; border-radius: 4px; font-size: .85rem; cursor: pointer; }
        .btn-avatar:hover { background: #4338ca; }
    </style>
</head>
<body>

<header>
    <h1>Wallet System</h1>
    <div class="header-nav">
        <a th:href="@{/dashboard}" th:text="#{dashboard.history.title}">Dashboard</a>
        <a th:href="@{/profile}" th:text="#{profile.nav.link}">Profile</a>
        <span th:text="#{dashboard.welcome(${memberName})}">Welcome</span>
        <form method="post" th:action="@{/logout}" style="margin:0">
            <button class="logout-btn" type="submit" th:text="#{dashboard.logout}">Logout</button>
        </form>
    </div>
</header>

<main>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="profile-card">
        <div class="profile-grid">

            <!-- ── Left: Avatar ── -->
            <div>
                <h3 class="section-title" th:text="#{profile.section.avatar}">Profile Picture</h3>
                <div class="avatar-wrap">
                    <img th:if="${member.avatarPath != null}"
                         th:src="@{'/uploads/' + ${member.avatarPath}}"
                         class="avatar-img" alt="avatar"/>
                    <div th:unless="${member.avatarPath != null}" class="avatar-placeholder">&#128100;</div>

                    <form method="post" th:action="@{/profile/avatar}"
                          enctype="multipart/form-data" class="avatar-form">
                        <input type="file" name="avatar" accept="image/*" required/>
                        <button class="btn-avatar" type="submit"
                                th:text="#{profile.avatar.submit}">Upload Avatar</button>
                        <p class="hint" th:text="#{profile.avatar.hint}">JPG, PNG, GIF, WEBP — Max 2 MB</p>
                    </form>
                </div>
            </div>

            <!-- ── Right: Personal Info ── -->
            <div>
                <h3 class="section-title" th:text="#{profile.section.info}">Personal Information</h3>
                <form method="post" th:action="@{/profile}">

                    <!-- Email: read-only -->
                    <div class="field-group">
                        <label th:text="#{profile.label.email}">Email</label>
                        <div class="field-readonly" th:text="${member.email}"></div>
                    </div>

                    <!-- Name: required -->
                    <div class="field-group">
                        <label for="name" th:text="#{profile.label.name}">Name</label>
                        <input type="text" id="name" name="name"
                               th:value="${member.name}" required maxlength="255"/>
                    </div>

                    <!-- Nickname -->
                    <div class="field-group">
                        <label for="nickname" th:text="#{profile.label.nickname}">Nickname</label>
                        <input type="text" id="nickname" name="nickname"
                               th:value="${member.nickname}"
                               th:placeholder="#{profile.placeholder.nickname}" maxlength="100"/>
                    </div>

                    <!-- Phone -->
                    <div class="field-group">
                        <label for="phone" th:text="#{profile.label.phone}">Phone Number</label>
                        <input type="tel" id="phone" name="phone"
                               th:value="${member.phone}"
                               th:placeholder="#{profile.placeholder.phone}" maxlength="20"/>
                    </div>

                    <!-- Bio -->
                    <div class="field-group">
                        <label for="bio" th:text="#{profile.label.bio}">Bio</label>
                        <textarea id="bio" name="bio" rows="3" maxlength="255"
                                  th:placeholder="#{profile.placeholder.bio}"
                                  th:text="${member.bio}"></textarea>
                    </div>

                    <!-- Birthday -->
                    <div class="field-group">
                        <label for="birthday" th:text="#{profile.label.birthday}">Birthday</label>
                        <input type="date" id="birthday" name="birthday"
                               th:value="${member.birthday}"/>
                    </div>

                    <button class="btn-primary" type="submit"
                            th:text="#{profile.submit}">Save Changes</button>
                </form>
            </div>

        </div>
    </div>
</main>

<img src="/transfer.jpg" alt="" style="position:fixed;bottom:20px;right:20px;width:88px;border-radius:10px;opacity:.88;z-index:999;pointer-events:none;">
</body>
</html>
