<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{withdraw.title}">Withdraw</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; color: #333; }

        /* ── Header ── */
        header { background: #4f46e5; color: #fff; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; }
        .logout-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4);
            color: #fff; padding: .4rem .9rem; border-radius: 4px; cursor: pointer; font-size: .85rem; }
        .logout-btn:hover { background: rgba(255,255,255,.35); }

        main { max-width: 520px; margin: 2.5rem auto; padding: 0 1rem; }

        /* ── Alert ── */
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: .9rem; }
        .alert-error   { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8e8; color: #27ae60; }

        /* ── Balance strip ── */
        .balance-strip { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 1rem 1.5rem; margin-bottom: 1.25rem;
            display: flex; justify-content: space-between; align-items: center; }
        .balance-label { font-size: .8rem; color: #888; }
        .balance-amount { font-size: 1.5rem; font-weight: 700; color: #4f46e5; }

        /* ── Form card ── */
        .form-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1.75rem; }
        .form-card h2 { font-size: 1.1rem; margin-bottom: 1.5rem; color: #333; }

        /* ── Fields ── */
        .field { margin-bottom: 1.25rem; }
        .field label { display: block; font-size: .82rem; color: #555; margin-bottom: .35rem; font-weight: 500; }
        .field input { width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
            border-radius: 6px; font-size: .95rem; }
        .field input:focus { outline: none; border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79,70,229,.15); }
        .field .hint { font-size: .75rem; color: #aaa; margin-top: .3rem; }

        /* ── Divider ── */
        .section-divider { font-size: .75rem; font-weight: 600; color: #aaa;
            text-transform: uppercase; letter-spacing: .06em;
            border-bottom: 1px solid #f0f0f0; padding-bottom: .4rem; margin-bottom: 1.1rem; }

        /* ── Bank code + account side by side ── */
        .bank-row { display: grid; grid-template-columns: 120px 1fr; gap: .75rem; margin-bottom: 1.25rem; }
        .bank-row .field { margin-bottom: 0; }

        /* ── Submit ── */
        .btn-submit { width: 100%; margin-top: .5rem; padding: .7rem; background: #dc2626;
            color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500; }
        .btn-submit:hover { background: #b91c1c; }

        /* ── Card brand logos ── */
        .card-brands { display: flex; gap: .6rem; align-items: center; margin-bottom: 1.4rem; }
        .card-brand-logo { height: 32px; object-fit: contain; }

        /* ── Back link ── */
        .back-link { display: inline-block; margin-top: 1.25rem; font-size: .85rem;
            color: #6b7280; text-decoration: none; }
        .back-link:hover { color: #4f46e5; }
    </style>
</head>
<body>

<header>
    <h1>Wallet System</h1>
    <div style="display:flex; align-items:center; gap:1rem;">
        <a th:href="@{/profile}" style="color:#fff; font-size:.9rem; opacity:.85; text-decoration:none;"
           th:text="#{profile.nav.link}">Profile</a>
        <span th:text="#{dashboard.welcome(${memberName})}" style="font-size:.9rem; opacity:.85;"></span>
        <form method="post" th:action="@{/logout}" style="margin:0">
            <button class="logout-btn" type="submit" th:text="#{dashboard.logout}">Logout</button>
        </form>
    </div>
</header>

<main>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Balance -->
    <div class="balance-strip">
        <div class="balance-label" th:text="#{withdraw.balance.label}">Current Balance</div>
        <div class="balance-amount" th:text="'$ ' + ${#numbers.formatDecimal(wallet.balance, 1, 2)}"></div>
    </div>

    <!-- Withdraw form -->
    <div class="form-card">
        <h2 th:text="#{withdraw.heading}">Withdraw Funds</h2>
        <div class="card-brands">
            <img class="card-brand-logo" th:src="@{/visa.png}"       alt="Visa"/>
            <img class="card-brand-logo" th:src="@{/mastercard.png}" alt="Mastercard"/>
            <img class="card-brand-logo" th:src="@{/jcb.png}"        alt="JCB"/>
        </div>

        <form method="post" th:action="@{/withdraw}">

            <!-- Amount -->
            <div class="section-divider" th:text="#{withdraw.section.amount}">Amount</div>
            <div class="field">
                <label th:text="#{withdraw.amount.label}">Withdrawal Amount</label>
                <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required/>
            </div>

            <!-- Bank info -->
            <div class="section-divider" th:text="#{withdraw.section.bank}">Bank Details</div>
            <div class="bank-row">
                <div class="field">
                    <label th:text="#{withdraw.bank.code.label}">Bank Code</label>
                    <input type="text" name="bankCode"
                           maxlength="7"
                           pattern="[0-9]{3,7}"
                           placeholder="e.g. 012"
                           required/>
                    <div class="hint" th:text="#{withdraw.bank.code.hint}">3–7 digits</div>
                </div>
                <div class="field">
                    <label th:text="#{withdraw.bank.account.label}">Account Number</label>
                    <input type="text" name="bankAccount"
                           maxlength="16"
                           pattern="[0-9]{10,16}"
                           placeholder="e.g. 0123456789"
                           required/>
                    <div class="hint" th:text="#{withdraw.bank.account.hint}">10–16 digits</div>
                </div>
            </div>

            <!-- Notification email -->
            <div class="section-divider" th:text="#{withdraw.section.notification}">Notification</div>
            <div class="field">
                <label th:text="#{withdraw.email.label}">Notification Email</label>
                <input type="email" name="notifyEmail"
                       th:placeholder="#{withdraw.email.placeholder}"
                       required/>
                <div class="hint" th:text="#{withdraw.email.hint}">A confirmation will be sent to this address.</div>
            </div>

            <button class="btn-submit" type="submit" th:text="#{withdraw.submit}">Submit Withdrawal</button>
        </form>
    </div>

    <a class="back-link" th:href="@{/dashboard}" th:text="#{withdraw.back}">← Back to Dashboard</a>
</main>

<img src="/test-mode.png" alt="" style="position:fixed;bottom:20px;right:20px;width:88px;border-radius:10px;opacity:.88;z-index:999;pointer-events:none;">
</body>
</html>
