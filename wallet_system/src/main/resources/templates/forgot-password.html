<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{forgot.title}">Forgot Password</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 360px; }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: .5rem; color: #333; }
        .subtitle { text-align: center; font-size: .9rem; color: #666; margin-bottom: 1.5rem; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-info  { background: #e8f0fe; color: #1d4ed8; }
        label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
        input[type="email"] {
            width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: 1rem; margin-bottom: 1rem;
        }
        button { width: 100%; padding: .75rem; background: #4f46e5; color: #fff;
            border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4338ca; }
        p { text-align: center; margin-top: 1rem; font-size: .9rem; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="#{forgot.heading}">Reset Your Password</h1>
    <p class="subtitle" th:text="#{forgot.prompt}">We'll send you a reset link.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${info}"  class="alert alert-info"  th:text="${info}"></div>

    <form method="post" th:action="@{/forgot-password}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="email" th:text="#{forgot.label.email}">Email Address</label>
        <input type="email" id="email" name="email" required autofocus/>
        <button type="submit" th:text="#{forgot.submit}">Send Reset Link</button>
    </form>
    <p><a th:href="@{/login}">&larr; Back to login</a></p>
</div>
</body>
</html>
