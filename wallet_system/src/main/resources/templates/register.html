<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Create Account</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 360px; }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: 1rem; margin-bottom: 1rem;
        }
        button { width: 100%; padding: .75rem; background: #4f46e5; color: #fff;
            border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4338ca; }
        p { text-align: center; margin-top: 1rem; font-size: .9rem; }
        a { color: #4f46e5; text-decoration: none; }
        .guest-tip { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: .8rem 1rem; margin-bottom: 1.25rem; font-size: .85rem; color: #1e40af; }
        .guest-tip-title { font-weight: 700; margin-bottom: .3rem; }
        .guest-tip-body { color: #3b5a9a; margin-bottom: .5rem; }
        .guest-tip-cred { display: flex; flex-direction: column; gap: .25rem; }
        .guest-tip-cred span { display: flex; align-items: center; gap: .4rem; }
        .guest-tip-cred code { background: #dbeafe; padding: .15rem .45rem; border-radius: 4px; font-size: .82rem; font-family: monospace; letter-spacing: .01em; }
        .btn-testmode { width: 100%; padding: .5rem; background: #1e40af; color: #fff;
            border: none; border-radius: 4px; font-size: .85rem; cursor: pointer; margin-top: .6rem; }
        .btn-testmode:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="#{register.title}">Create Account</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="guest-tip">
        <div class="guest-tip-title" th:text="#{register.guest.title}">Just browsing?</div>
        <div class="guest-tip-body" th:text="#{register.guest.body}">No commitment needed. Try the app with our demo account:</div>
        <div class="guest-tip-cred">
            <span>Email: <code>test1234@gmail.com</code></span>
            <span>Password: <code>test1234</code></span>
            <span>OTP: <code>123456</code></span>
        </div>
        <form method="post" th:action="@{/register/test}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-testmode" th:text="#{register.testmode.button}">Try Test Mode</button>
        </form>
    </div>

    <form method="post" th:action="@{/register}">
        <label for="name" th:text="#{register.name}">Name</label>
        <input type="text" id="name" name="name" required autofocus/>

        <label for="age" th:text="#{register.age}">Age (optional)</label>
        <input type="number" id="age" name="age" min="0"/>

        <label for="email" th:text="#{register.email}">Email</label>
        <input type="email" id="email" name="email" required/>

        <label for="password" th:text="#{register.password}">Password (min. 6 characters)</label>
        <input type="password" id="password" name="password" required minlength="6"/>

        <button type="submit" th:text="#{register.submit}">Register</button>
    </form>
    <p>
        <span th:text="#{register.login.prompt}">Already have an account?</span>
        <a th:href="@{/login}" th:text="#{register.login.link}">Back to login</a>
    </p>
</div>
</body>
</html>
