openapi: 3.0.3

info:
  title: Wallet System API
  description: |
    Personal e-wallet system.

    ## Authentication
    This system uses **Session-based** authentication. Obtain a session cookie (`JSESSIONID`)
    via `POST /login/otp` (after OTP verification), then include the cookie in all subsequent
    requests to protected endpoints.

    ## Wallet Code
    Each member automatically receives a **12-character alphanumeric wallet code** (mixed case)
    after completing Email OTP verification during registration. This code is used to identify
    the payee in peer-to-peer transfers (instead of Email) and can be copied from the dashboard.
  version: 1.3.0

servers:
  - url: http://localhost:8080
    description: wallet-service — Auth, Profile, Wallet, Withdraw Webhook
  - url: http://localhost:8082
    description: payment-service — Stripe, SoftBank Payment

tags:
  - name: Auth
    description: Authentication — registration, login, OTP verification, password reset
  - name: Profile
    description: Profile — view and update personal info, avatar upload
  - name: Wallet
    description: Wallet operations — dashboard, deposit, withdraw, transfer (login required)
  - name: Payment
    description: |
      Payment gateways — Stripe, SoftBank Payment, withdrawal webhook.

      > **Architecture note:** All `/payment/stripe/*` and `/payment/sbpayment/*` endpoints are served
      > by **payment-service** (`http://localhost:8082`). The `/withdraw/webhook` endpoint is served
      > by **wallet-service** (`http://localhost:8080`).

# All protected endpoints require session cookie by default
security:
  - cookieAuth: []

paths:

  # ── Root ──────────────────────────────────────────────────

  /:
    get:
      tags: [Wallet]
      summary: Root redirect
      description: Redirects to the dashboard.
      responses:
        '302':
          description: → `/dashboard` (unauthenticated → `/login`)

  # ── Auth ──────────────────────────────────────────────────

  /login:
    get:
      tags: [Auth]
      summary: Show login page
      security: []
      parameters:
        - name: error
          in: query
          schema:
            type: string
          description: When present, displays "Invalid email or password" message
        - name: locked
          in: query
          schema:
            type: string
          description: When present, displays "Account locked" message
      responses:
        '200':
          description: Login page HTML

    post:
      tags: [Auth]
      summary: Member login
      description: |
        Validates email / password. On success, sends a login OTP and redirects to `/login/otp`.
        On failure, redirects to `/login?error`.
        After 5 consecutive failures the account is locked for 15 minutes and redirects to `/login?locked`.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '302':
          description: Success → `/login/otp`; failure → `/login?error`; locked → `/login?locked`

  /login/otp:
    get:
      tags: [Auth]
      summary: Show login OTP page
      security: []
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: OTP session token (from the post-login redirect)
      responses:
        '200':
          description: OTP input page HTML
        '302':
          description: Invalid or expired token → `/login`

    post:
      tags: [Auth]
      summary: Verify login OTP
      description: |
        Verifies the 6-digit OTP entered by the user. On success, creates a login session
        and redirects to `/dashboard`. After 5 failed attempts the OTP is invalidated and
        the user must log in again.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, code]
              properties:
                token:
                  type: string
                  description: OTP session token
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: '123456'
                  description: 6-digit OTP
      responses:
        '302':
          description: Success → `/dashboard` (sets JSESSIONID); failure → `/login/otp?token=...`
          headers:
            Set-Cookie:
              description: JSESSIONID (set after successful OTP verification)
              schema:
                type: string
                example: JSESSIONID=abc123; Path=/; HttpOnly

  /login/otp/resend:
    post:
      tags: [Auth]
      summary: Resend login OTP
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: OTP session token
      responses:
        '302':
          description: → `/login/otp?token=...` (with success or error flash message)

  /register:
    get:
      tags: [Auth]
      summary: Show registration page
      security: []
      responses:
        '200':
          description: Registration page HTML

    post:
      tags: [Auth]
      summary: Initiate registration
      description: |
        Creates a pending account with BCrypt-hashed password and sends an Email OTP.
        On success, redirects to `/register/otp` for Email verification.
        On duplicate email, redirects back to `/register` with a flash error.

        > **Note:** The wallet and 12-character wallet code are created **after OTP verification**
        > (`/register/otp`), not at this step.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Alice Wang
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
      responses:
        '302':
          description: Success → `/register/otp`; duplicate email → `/register`

  /register/otp:
    get:
      tags: [Auth]
      summary: Show registration OTP page
      security: []
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: OTP session token (from the post-registration redirect)
      responses:
        '200':
          description: OTP input page HTML
        '302':
          description: Invalid or expired token → `/register`

    post:
      tags: [Auth]
      summary: Verify registration OTP and activate account
      description: |
        Verifies the OTP, activates the account, and automatically creates the wallet
        with a 12-character wallet code. On success, redirects to `/login`.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, code]
              properties:
                token:
                  type: string
                  description: OTP session token
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: '654321'
                  description: 6-digit OTP
      responses:
        '302':
          description: Success → `/login`; failure → `/register/otp?token=...`

  /register/otp/resend:
    post:
      tags: [Auth]
      summary: Resend registration OTP
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: OTP session token
      responses:
        '302':
          description: → `/register/otp?token=...` (with success or error flash message)

  /logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidates the session, deletes the JSESSIONID cookie, and redirects to `/login`.
      responses:
        '302':
          description: → `/login`

  /forgot-password:
    get:
      tags: [Auth]
      summary: Show forgot password page
      security: []
      responses:
        '200':
          description: Forgot password page HTML

    post:
      tags: [Auth]
      summary: Send password reset email
      description: |
        If the email exists and belongs to a local account (not Google OAuth2), sends a reset link.
        The same success message is shown regardless of whether the email exists (prevents account enumeration).
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
      responses:
        '302':
          description: → `/forgot-password` (with success flash message)

  /reset-password:
    get:
      tags: [Auth]
      summary: Validate password reset token
      description: |
        Validates the token from the reset email link. If valid, stores reset permission in
        the session and redirects to the reset form. Invalid or expired tokens redirect to `/login`.
      security: []
      parameters:
        - name: mid
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Member UUID
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Password reset token (URL-safe, stored in session)
      responses:
        '302':
          description: Valid → `/reset-password/form`; invalid → `/login`

    post:
      tags: [Auth]
      summary: Execute password reset
      description: |
        Updates the account password (BCrypt-hashed), clears the session reset permission,
        and redirects to `/login`.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: newPassword123
      responses:
        '302':
          description: Success → `/login`; failure → `/reset-password/form`

  /reset-password/form:
    get:
      tags: [Auth]
      summary: Show password reset form
      description: Requires prior validation via `GET /reset-password` (session must hold reset permission).
      security: []
      responses:
        '200':
          description: Password reset form HTML
        '302':
          description: Invalid session → `/login`

  # ── Profile ───────────────────────────────────────────────

  /profile:
    get:
      tags: [Profile]
      summary: Show profile page
      description: Displays the current member's profile (name, nickname, phone, birthday, bio, avatar).
      responses:
        '200':
          description: Profile page HTML
        '302':
          description: Unauthenticated → `/login`

    post:
      tags: [Profile]
      summary: Update profile
      description: |
        Updates the current member's personal info. `name` is required; all other fields are optional.
        On success, the `memberName` session attribute is updated and the user is redirected back
        to `/profile` with a flash message.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Alice Wang
                nickname:
                  type: string
                  maxLength: 100
                  example: Alice
                  description: Display name (optional)
                phone:
                  type: string
                  maxLength: 20
                  example: '0912345678'
                  description: Phone number (optional)
                bio:
                  type: string
                  maxLength: 255
                  example: Hi, I love coding!
                  description: Bio / self-introduction (optional)
                birthday:
                  type: string
                  format: date
                  example: '1990-05-20'
                  description: Date of birth, format yyyy-MM-dd (optional)
      responses:
        '302':
          description: Success or failure both redirect to `/profile` with a flash message

  /profile/avatar:
    post:
      tags: [Profile]
      summary: Upload avatar
      description: |
        Uploads a profile avatar. Accepted MIME types: `image/jpeg`, `image/png`, `image/gif`, `image/webp`.
        Maximum file size: 2 MB. The previous avatar file is deleted on successful upload.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file (JPG / PNG / GIF / WEBP, max 2 MB)
      responses:
        '302':
          description: Success or failure both redirect to `/profile` with a flash message

  # ── Wallet ────────────────────────────────────────────────

  /dashboard:
    get:
      tags: [Wallet]
      summary: Dashboard
      description: |
        Displays:
        - Current wallet balance
        - 12-character wallet code (copyable for receiving transfers)
        - Transaction history (DEPOSIT / WITHDRAW / TRANSFER) with type filter, date range filter, and pagination
        - Entry points to deposit, withdraw, and transfer pages
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Page number (0-based)
        - name: type
          in: query
          schema:
            type: string
            enum: [DEPOSIT, WITHDRAW, TRANSFER]
          description: Filter by transaction type (optional)
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date, format yyyy-MM-dd (optional)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date, format yyyy-MM-dd (optional)
      responses:
        '200':
          description: Dashboard page HTML
        '302':
          description: Unauthenticated → `/login`

  /deposit:
    get:
      tags: [Wallet]
      summary: Show deposit page
      description: Displays the deposit form with amount input and payment method selection (Stripe / SB Payment).
      responses:
        '200':
          description: Deposit page HTML
        '302':
          description: Unauthenticated → `/login`

    post:
      tags: [Wallet]
      summary: Initiate deposit
      description: |
        Creates a one-time payment token (stored in Redis, 15-minute TTL) containing
        the member ID, amount, payment method, and optional notification email, then
        redirects the browser to **payment-service** with `?token={uuid}`.

        - `stripe` → `http://localhost:8082/payment/stripe/checkout?token={token}`
        - `sbpayment` → `http://localhost:8082/payment/sbpayment/request?token={token}`

        payment-service validates the token (single-use, consumed on read), initiates
        a `PENDING` deposit transaction via wallet-service's internal API, then handles
        the gateway flow. Actual wallet credit happens after the gateway webhook fires.
        If `notifyEmail` is provided, a confirmation email is sent on deposit completion.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 1000.00
                  description: Deposit amount (positive)
                paymentMethod:
                  type: string
                  enum: [stripe, sbpayment]
                  default: stripe
                  description: Payment method (optional, defaults to stripe)
                notifyEmail:
                  type: string
                  format: email
                  example: alice@example.com
                  description: Optional email address to receive a confirmation when the deposit completes
      responses:
        '302':
          description: |
            stripe → `http://localhost:8082/payment/stripe/checkout?token=...`;
            sbpayment → `http://localhost:8082/payment/sbpayment/request?token=...`;
            invalid amount or unknown method → `/deposit`

  /withdraw:
    get:
      tags: [Wallet]
      summary: Show withdraw page
      description: Displays the withdrawal form with amount, bank code, bank account, and notification email fields.
      responses:
        '200':
          description: Withdraw page HTML
        '302':
          description: Unauthenticated → `/login`

    post:
      tags: [Wallet]
      summary: Initiate withdrawal
      description: |
        Deducts the specified amount from the wallet and creates a PENDING transaction,
        then asynchronously notifies the mock bank. The final status (COMPLETED / FAILED)
        is updated via `POST /withdraw/webhook`. On failure, the balance is automatically refunded.

        > `bankCode` and `bankAccount` are forwarded to mock-bank for the payout.
        > If `notifyEmail` is provided, a confirmation email is sent when the withdrawal completes.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 500.00
                  description: Withdrawal amount (positive, must not exceed balance)
                bankCode:
                  type: string
                  minLength: 3
                  maxLength: 7
                  pattern: '^\d{3,7}$'
                  example: '012'
                  description: Bank code, 3–7 digits (front-end field)
                bankAccount:
                  type: string
                  minLength: 10
                  maxLength: 16
                  pattern: '^\d{10,16}$'
                  example: '0123456789'
                  description: Bank account number, 10–16 digits (front-end field)
                notifyEmail:
                  type: string
                  format: email
                  example: alice@example.com
                  description: |
                    Optional notification email. If provided, a confirmation email is sent
                    via email-service when the withdrawal completes successfully.
      responses:
        '302':
          description: Success → `/dashboard` (transaction PENDING, awaiting mock-bank webhook); failure → `/withdraw`

  /transfer:
    get:
      tags: [Wallet]
      summary: Show transfer page
      description: Displays the transfer form with payee wallet code and amount fields.
      responses:
        '200':
          description: Transfer page HTML
        '302':
          description: Unauthenticated → `/login`

    post:
      tags: [Wallet]
      summary: Transfer funds
      description: |
        Transfers the specified amount to another wallet identified by its 12-character wallet code.

        **Restrictions:**
        - Cannot transfer to yourself
        - Amount must not exceed current balance
        - Wallet code must exist
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [toWalletCode, amount]
              properties:
                toWalletCode:
                  type: string
                  minLength: 12
                  maxLength: 12
                  pattern: '^[A-Za-z0-9]{12}$'
                  example: aB3xZ9qRmK2w
                  description: Payee's 12-character wallet code (alphanumeric, mixed case)
                amount:
                  type: number
                  minimum: 0.01
                  example: 200.00
                  description: Transfer amount (positive, must not exceed balance)
      responses:
        '302':
          description: Success → `/dashboard`; failure → `/transfer` with flash message

  # ── Payment — Stripe ──────────────────────────────────────

  /payment/stripe/checkout:
    get:
      tags: [Payment]
      summary: Stripe checkout page
      description: |
        Validates the one-time payment token via wallet-service's internal API (single-use,
        consumed on read). On success, creates a Stripe PaymentIntent and renders
        `stripe-checkout.html` with the `clientSecret` for Stripe.js to handle 3DS and
        payment confirmation. Redirects to wallet-service `/deposit` on invalid/expired token.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: One-time payment token issued by `POST /deposit` on wallet-service
      responses:
        '200':
          description: Stripe checkout page HTML (includes Stripe.js)
        '302':
          description: Invalid/expired token → wallet-service `/deposit`; Stripe API error → wallet-service `/deposit`

  /payment/stripe/complete:
    get:
      tags: [Payment]
      summary: Stripe payment success callback
      description: |
        Browser is redirected here by Stripe.js after successful payment.
        Redirects to wallet-service dashboard.

        > Actual wallet credit is handled by `POST /payment/stripe/webhook`.
        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      responses:
        '302':
          description: → wallet-service `/dashboard`

  /payment/stripe/cancel:
    get:
      tags: [Payment]
      summary: Stripe payment cancel callback
      description: |
        Browser is redirected here when the user closes or cancels the Stripe checkout.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      responses:
        '302':
          description: → wallet-service `/deposit`

  /payment/stripe/webhook:
    post:
      tags: [Payment]
      summary: Stripe webhook (server-to-server)
      description: |
        Called by Stripe servers to deliver `payment_intent.succeeded` events.
        Verifies the `Stripe-Signature` header, then calls wallet-service's internal API
        (`POST /internal/deposit/complete`) to credit the wallet. Idempotent — duplicate
        deliveries are silently skipped. Any non-2xx response triggers a Stripe retry.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: Stripe webhook signature for request verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe Event JSON (do not re-serialize)
      responses:
        '200':
          description: Processed successfully, returns `OK`
        '400':
          description: Signature verification failed or processing error

  # ── Payment — SoftBank Payment ────────────────────────────

  /payment/sbpayment/request:
    get:
      tags: [Payment]
      summary: SBPS payment request page
      description: |
        Validates the one-time payment token via wallet-service's internal API, builds an
        SBPS payment request (SHA-1 hashcode of concatenated fields + hashKey, timestamp in JST),
        and renders an auto-submit form (`sb-payment.html`) that posts to the SBPS gateway.
        Redirects to wallet-service `/deposit` on invalid/expired token.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: One-time payment token issued by `POST /deposit` on wallet-service
      responses:
        '200':
          description: SBPS auto-submit form page HTML
        '302':
          description: Invalid/expired token → wallet-service `/deposit`

  /payment/sbpayment/result:
    post:
      tags: [Payment]
      summary: SBPS result CGI (server-to-server)
      description: |
        Result CGI endpoint called by the SBPS server after payment.
        Verifies `res_result=OK`, then calls wallet-service's internal API
        (`POST /internal/deposit/complete-by-external`) using the `order_id` to credit the wallet.
        Idempotent — duplicate callbacks are silently skipped via PENDING status check.

        Request body is **Shift-JIS (Windows-31J)** URL-encoded form data.
        Response format: success `OK,`, failure `NG,<message>`.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                res_result:
                  type: string
                  example: OK
                  description: Payment result (OK / NG)
                order_id:
                  type: string
                  description: Order ID matching an entry in pendingOrders
                res_pay_amount:
                  type: string
                  description: Actual payment amount
      responses:
        '200':
          description: Success returns `OK,`; failure returns `NG,<message>`

  /payment/sbpayment/complete:
    get:
      tags: [Payment]
      summary: SBPS payment success callback
      description: |
        Browser is redirected here by SBPS after successful payment.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      responses:
        '302':
          description: → wallet-service `/dashboard`

  /payment/sbpayment/cancel:
    get:
      tags: [Payment]
      summary: SBPS payment cancel callback
      description: |
        Browser is redirected here when the user cancels payment on the SBPS page.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      responses:
        '302':
          description: → wallet-service `/deposit`

  /payment/sbpayment/error:
    get:
      tags: [Payment]
      summary: SBPS payment error callback
      description: |
        Browser is redirected here when SBPS reports a payment error.

        > Served by **payment-service** (`http://localhost:8082`).
      security: []
      responses:
        '302':
          description: → wallet-service `/deposit`

  # ── Withdraw Webhook ──────────────────────────────────────

  /withdraw/webhook:
    post:
      tags: [Payment]
      summary: Withdrawal result webhook (server-to-server)
      description: |
        Called by the mock bank service to report the final withdrawal result.
        - `result=SUCCESS`: marks the transaction as COMPLETED
        - Any other value (including `FAILED`): marks the transaction as FAILED and refunds the balance
        Returns 400 if `transactionId` is missing or malformed.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, result]
              properties:
                transactionId:
                  type: string
                  format: uuid
                  example: 4cee06dc-0d00-469c-bbe0-6d065fc18445
                  description: Withdrawal transaction UUID
                result:
                  type: string
                  enum: [SUCCESS, FAILED]
                  example: SUCCESS
                  description: Withdrawal outcome
      responses:
        '200':
          description: Processed successfully
        '400':
          description: Missing or malformed transactionId
        '500':
          description: Failed to update transaction status (internal error)

# ── Components ──────────────────────────────────────────────

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Session cookie set after successful OTP verification at `POST /login/otp`
