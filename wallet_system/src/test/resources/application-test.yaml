spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
  data:
    redis:
      host: localhost
      port: 6379

stripe:
  secret-key: sk_test_dummy
  publishable-key: pk_test_dummy
  webhook-secret: whsec_dummy

sbpayment:
  merchant-id: test_merchant
  service-id: test_service
  hash-key: test_hash_key
  gateway-url: "https://google.com"
  base-url: ${SP_PAYMENT_REDIRECT_URL}

withdraw:
  webhook-secret: test-webhook-secret

app:
  base-url: "http://localhost:8080"
  upload:
    dir: uploads

mock-bank:
  url: "http://localhost:8081"
