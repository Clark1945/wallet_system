server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wallet_system
    static_configs:
      - targets:
          - localhost
        labels:
          app: wallet_system
          __path__: /logs/wallet-system/*.log
    pipeline_stages:
      - regex:
          expression: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \[[^\]]+\] (?P<level>\S+)'
      - labels:
          level:

  - job_name: mock_bank
    static_configs:
      - targets:
          - localhost
        labels:
          app: mock_bank
          __path__: /logs/mock-bank/*.log
    pipeline_stages:
      - regex:
          expression: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \[[^\]]+\] (?P<level>\S+)'
      - labels:
          level:
