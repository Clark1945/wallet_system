openapi: 3.0.3

info:
  title: Wallet System API
  description: |
    個人電子錢包系統。

    ## 認證方式
    本系統採用 **Session-based** 認證。透過 `POST /login` 取得 session cookie (`JSESSIONID`)，
    後續受保護的端點需在 request header 中帶上此 cookie。

    ## 錢包代碼
    每位會員在註冊時會自動產生一組 **12 碼英數字錢包代碼**（大小寫混合），
    用於識別收款方身份（取代 Email），可在儀表板頁面複製分享。
  version: 1.1.0

servers:
  - url: http://localhost:8080
    description: 本地開發環境

tags:
  - name: Auth
    description: 會員認證 — 註冊、登入、登出
  - name: Profile
    description: 個人資料 — 查看與更新個人資訊、頭像上傳
  - name: Wallet
    description: 錢包操作 — 儀表板、儲值、提款、轉帳（需登入）

# 預設所有受保護端點需要 session cookie
security:
  - cookieAuth: []

paths:

  # ── Auth ──────────────────────────────────────────────────

  /login:
    get:
      tags: [Auth]
      summary: 顯示登入頁面
      security: []
      responses:
        '200':
          description: 登入頁面 HTML

    post:
      tags: [Auth]
      summary: 會員登入
      description: |
        驗證 Email / 密碼，成功後建立 session 並回傳 `Set-Cookie: JSESSIONID`。
        失敗則導回 `/login` 並附帶 flash error 訊息。
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '302':
          description: 成功 → `/dashboard`；失敗 → `/login`
          headers:
            Set-Cookie:
              description: JSESSIONID（成功登入時設定）
              schema:
                type: string
                example: JSESSIONID=abc123; Path=/; HttpOnly

  /register:
    get:
      tags: [Auth]
      summary: 顯示註冊頁面
      security: []
      responses:
        '200':
          description: 註冊頁面 HTML

    post:
      tags: [Auth]
      summary: 會員註冊
      description: |
        建立新帳號，密碼以 BCrypt 加密存儲。
        成功後自動產生錢包與 12 碼錢包代碼，並導向登入頁。
        Email 重複時導回 `/register` 並附帶 flash error。
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: 王小明
                age:
                  type: integer
                  minimum: 0
                  example: 25
                  description: 選填，預設 0
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
      responses:
        '302':
          description: 成功 → `/login`；Email 重複 → `/register`

  /logout:
    post:
      tags: [Auth]
      summary: 登出
      description: 清除 session，導向 `/login`。
      responses:
        '302':
          description: → `/login`

  # ── Profile ───────────────────────────────────────────────

  /profile:
    get:
      tags: [Profile]
      summary: 顯示個人資料頁面
      description: 顯示目前登入會員的個人資訊（姓名、暱稱、電話、生日、自我介紹、頭像）。
      responses:
        '200':
          description: 個人資料頁面 HTML
        '302':
          description: 未登入 → `/login`

    post:
      tags: [Profile]
      summary: 更新個人資料
      description: |
        更新登入會員的個人資訊。`name` 為必填，其餘欄位選填。
        成功後 session 中的 `memberName` 同步更新，導回 `/profile` 附帶 flash 訊息。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: 王小明
                nickname:
                  type: string
                  maxLength: 100
                  example: Xiao Ming
                  description: 暱稱（選填）
                phone:
                  type: string
                  maxLength: 20
                  example: '0912345678'
                  description: 電話號碼（選填）
                bio:
                  type: string
                  maxLength: 255
                  example: Hi, I love coding!
                  description: 自我介紹（選填）
                birthday:
                  type: string
                  format: date
                  example: '1990-05-20'
                  description: 生日，格式 yyyy-MM-dd（選填）
      responses:
        '302':
          description: 成功 / 失敗皆導回 `/profile`，結果以 flash 訊息顯示

  /profile/avatar:
    post:
      tags: [Profile]
      summary: 上傳頭像
      description: |
        上傳個人頭像圖片。接受格式：`image/jpeg`、`image/png`、`image/gif`、`image/webp`。
        最大檔案大小：2 MB。
        上傳成功後舊頭像檔案自動刪除。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: 圖片檔案（JPG / PNG / GIF / WEBP，最大 2 MB）
      responses:
        '302':
          description: 成功 / 失敗皆導回 `/profile`，結果以 flash 訊息顯示

  # ── Wallet ────────────────────────────────────────────────

  /dashboard:
    get:
      tags: [Wallet]
      summary: 儀表板
      description: |
        顯示：
        - 目前錢包餘額
        - 12 碼錢包代碼（可複製分享給他人匯款）
        - 交易紀錄（存款 / 提款 / 轉帳），支援類型篩選、日期範圍篩選與分頁
        - 儲值 / 提款 / 轉帳操作入口（各自導向專屬頁面）
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: 頁碼（從 0 開始）
        - name: type
          in: query
          schema:
            type: string
            enum: [DEPOSIT, WITHDRAW, TRANSFER]
          description: 篩選交易類型（選填）
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: 篩選起始日期，格式 yyyy-MM-dd（選填）
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: 篩選結束日期，格式 yyyy-MM-dd（選填）
      responses:
        '200':
          description: 儀表板頁面 HTML
        '302':
          description: 未登入 → `/login`

  /deposit:
    get:
      tags: [Wallet]
      summary: 顯示儲值頁面
      description: 顯示儲值表單，包含金額輸入與支付方式選擇（Stripe / SB Payment）。
      responses:
        '200':
          description: 儲值頁面 HTML
        '302':
          description: 未登入 → `/login`

    post:
      tags: [Wallet]
      summary: 儲值
      description: |
        將指定金額存入自己的錢包，金額須大於 0。

        > **注意：** `paymentMethod` 目前為預留參數，金流串接尚未實作，
        > 實際儲值邏輯與支付方式無關。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 1000.00
                  description: 儲值金額（正數）
                paymentMethod:
                  type: string
                  enum: [stripe, sbpayment]
                  default: stripe
                  description: 支付方式（選填，預設 stripe）
      responses:
        '302':
          description: 成功 → `/dashboard`；失敗 → `/deposit`，結果以 flash 訊息顯示

  /withdraw:
    get:
      tags: [Wallet]
      summary: 顯示提款頁面
      description: 顯示提款表單，包含金額、銀行代碼、銀行帳號、通知 Email 欄位。
      responses:
        '200':
          description: 提款頁面 HTML
        '302':
          description: 未登入 → `/login`

    post:
      tags: [Wallet]
      summary: 提款
      description: |
        從錢包提出指定金額，不可超過目前餘額。

        > **注意：** `bankCode`、`bankAccount`、`notifyEmail` 為前端預留欄位，
        > 銀行出金與通知功能尚未實作，目前後端僅處理 `amount` 扣款邏輯。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 500.00
                  description: 提款金額（正數，不超過餘額）
                bankCode:
                  type: string
                  minLength: 3
                  maxLength: 7
                  pattern: '^\d{3,7}$'
                  example: '012'
                  description: 銀行代碼，3〜7 碼數字（前端欄位，後端尚未處理）
                bankAccount:
                  type: string
                  minLength: 10
                  maxLength: 16
                  pattern: '^\d{10,16}$'
                  example: '0123456789'
                  description: 銀行帳號，10〜16 碼數字（前端欄位，後端尚未處理）
                notifyEmail:
                  type: string
                  format: email
                  example: alice@example.com
                  description: 通知用 Email（前端欄位，後端尚未處理）
      responses:
        '302':
          description: 成功 / 失敗皆導向 `/dashboard`，結果以 flash 訊息顯示

  /transfer:
    get:
      tags: [Wallet]
      summary: 顯示轉帳頁面
      description: 顯示轉帳表單，包含收款方錢包代碼與金額輸入。
      responses:
        '200':
          description: 轉帳頁面 HTML
        '302':
          description: 未登入 → `/login`

    post:
      tags: [Wallet]
      summary: 轉帳
      description: |
        依對方 12 碼錢包代碼轉出金額。

        **限制：**
        - 不可轉給自己
        - 金額不可超過目前餘額
        - 錢包代碼必須存在
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [toWalletCode, amount]
              properties:
                toWalletCode:
                  type: string
                  minLength: 12
                  maxLength: 12
                  pattern: '^[A-Za-z0-9]{12}$'
                  example: aB3xZ9qRmK2w
                  description: 收款方 12 碼錢包代碼（大小寫英數字）
                amount:
                  type: number
                  minimum: 0.01
                  example: 200.00
                  description: 轉帳金額（正數，不超過餘額）
      responses:
        '302':
          description: 成功 → `/dashboard`；失敗 → `/transfer`，結果以 flash 訊息顯示

# ── Components ──────────────────────────────────────────────

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Session cookie，由 `POST /login` 成功後自動設定
