<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wallet System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; color: #333; }

        /* ── Header ── */
        header { background: #4f46e5; color: #fff; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; }
        header span { font-size: .9rem; opacity: .85; }
        .logout-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4);
            color: #fff; padding: .4rem .9rem; border-radius: 4px; cursor: pointer; font-size: .85rem; }
        .logout-btn:hover { background: rgba(255,255,255,.35); }

        main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

        /* ── Alert ── */
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1.25rem; font-size: .9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8e8; color: #27ae60; }

        /* ── Balance card ── */
        .balance-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
            padding: 1.5rem 2rem; margin-bottom: 1.5rem; }
        .balance-label { font-size: .85rem; color: #888; }
        .balance-amount { font-size: 2.4rem; font-weight: 700; color: #4f46e5; margin-top: .25rem; }

        /* ── Action grid ── */
        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        @media (max-width: 640px) { .actions { grid-template-columns: 1fr; } }
        .action-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1.25rem; }
        .action-card h3 { font-size: 1rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: .5rem; }
        .action-card label { display: block; font-size: .8rem; color: #666; margin-bottom: .2rem; }
        .action-card input { width: 100%; padding: .5rem .7rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: .95rem; margin-bottom: .75rem; }
        .btn { width: 100%; padding: .55rem; border: none; border-radius: 4px;
            font-size: .9rem; cursor: pointer; color: #fff; }
        .btn-deposit  { background: #16a34a; }
        .btn-deposit:hover  { background: #15803d; }
        .btn-withdraw { background: #dc2626; }
        .btn-withdraw:hover { background: #b91c1c; }
        .btn-transfer { background: #2563eb; }
        .btn-transfer:hover { background: #1d4ed8; }

        /* ── Transaction table ── */
        .table-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1.25rem; }
        .table-card h3 { font-size: 1rem; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: .88rem; }
        th { text-align: left; padding: .5rem .75rem; background: #f8f8f8; border-bottom: 2px solid #eee; color: #555; }
        td { padding: .55rem .75rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        .type-badge { padding: .2rem .55rem; border-radius: 999px; font-size: .78rem; font-weight: 600; }
        .type-DEPOSIT  { background: #dcfce7; color: #15803d; }
        .type-WITHDRAW { background: #fee2e2; color: #b91c1c; }
        .type-TRANSFER { background: #dbeafe; color: #1d4ed8; }
        .empty { text-align: center; color: #aaa; padding: 1.5rem; }

        /* ── Pagination ── */
        .pagination { display: flex; justify-content: center; align-items: center;
            gap: .35rem; margin-top: 1rem; flex-wrap: wrap; }
        .page-btn { display: inline-flex; align-items: center; justify-content: center;
            min-width: 2rem; height: 2rem; padding: 0 .5rem; border-radius: 4px;
            font-size: .85rem; text-decoration: none; color: #4f46e5;
            border: 1px solid #d1d5db; background: #fff; cursor: pointer; }
        .page-btn:hover { background: #eef2ff; }
        .page-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; font-weight: 600; }
        .page-btn.disabled { color: #bbb; border-color: #e5e7eb; cursor: default; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <h1>Wallet System</h1>
    <div style="display:flex; align-items:center; gap:1rem;">
        <span th:text="#{dashboard.welcome(${memberName})}">Welcome</span>
        <form method="post" th:action="@{/logout}" style="margin:0">
            <button class="logout-btn" type="submit" th:text="#{dashboard.logout}">Logout</button>
        </form>
    </div>
</header>

<main>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Balance -->
    <div class="balance-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
            <div>
                <div class="balance-label" th:text="#{dashboard.balance.label}">Current Balance</div>
                <div class="balance-amount" th:text="'$ ' + ${#numbers.formatDecimal(wallet.balance, 1, 2)}"></div>
            </div>
            <div style="text-align:right;">
                <div class="balance-label" th:text="#{dashboard.wallet.code.label}">My Wallet Code</div>
                <div style="display:flex; align-items:center; gap:.5rem; margin-top:.25rem;">
                    <code id="walletCode" style="font-size:1.1rem; font-weight:600; letter-spacing:.1em; color:#333;"
                          th:text="${wallet.walletCode}"></code>
                    <button onclick="copyCode()" style="padding:.25rem .6rem; font-size:.8rem; border:1px solid #ccc;
                        border-radius:4px; cursor:pointer; background:#fff;" th:text="#{dashboard.copy}">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('walletCode').textContent);
        }
    </script>

    <!-- Actions -->
    <div class="actions">
        <!-- Deposit -->
        <div class="action-card">
            <h3 th:text="#{dashboard.deposit.title}">Deposit</h3>
            <form method="post" th:action="@{/deposit}">
                <label th:text="#{dashboard.amount}">Amount</label>
                <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required/>
                <button class="btn btn-deposit" type="submit" th:text="#{dashboard.deposit.submit}">Deposit</button>
            </form>
        </div>

        <!-- Withdraw -->
        <div class="action-card">
            <h3 th:text="#{dashboard.withdraw.title}">Withdraw</h3>
            <form method="post" th:action="@{/withdraw}">
                <label th:text="#{dashboard.amount}">Amount</label>
                <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required/>
                <button class="btn btn-withdraw" type="submit" th:text="#{dashboard.withdraw.submit}">Withdraw</button>
            </form>
        </div>

        <!-- Transfer -->
        <div class="action-card">
            <h3 th:text="#{dashboard.transfer.title}">Transfer</h3>
            <form method="post" th:action="@{/transfer}">
                <label th:text="#{dashboard.transfer.code.label}">Recipient Wallet Code</label>
                <input type="text" name="toWalletCode" placeholder="e.g. aB3xZ9qRmK2w"
                       maxlength="12" pattern="[A-Za-z0-9]{12}" required/>
                <label th:text="#{dashboard.amount}">Amount</label>
                <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required/>
                <button class="btn btn-transfer" type="submit" th:text="#{dashboard.transfer.submit}">Transfer</button>
            </form>
        </div>
    </div>

    <!-- Transaction history -->
    <div class="table-card">
        <h3 th:text="#{dashboard.history.title}">Transaction History</h3>
        <table th:if="${!txPage.empty}">
            <thead>
            <tr>
                <th th:text="#{dashboard.history.time}">Time</th>
                <th th:text="#{dashboard.history.type}">Type</th>
                <th th:text="#{dashboard.history.desc}">Description</th>
                <th style="text-align:right" th:text="#{dashboard.history.amount}">Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${txPage.content}">
                <td th:text="${#temporals.format(tx.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <span class="type-badge"
                          th:classappend="'type-' + ${tx.type}"
                          th:text="#{transaction.type.__${tx.type}__}">
                    </span>
                </td>
                <td th:text="${tx.description}"></td>
                <td style="text-align:right" th:text="'$ ' + ${#numbers.formatDecimal(tx.amount, 1, 2)}"></td>
            </tr>
            </tbody>
        </table>
        <div class="empty" th:if="${txPage.empty}" th:text="#{dashboard.history.empty}">No transactions yet</div>

        <!-- Pagination -->
        <div th:if="${txPage.totalPages > 1}" class="pagination">
            <a th:if="${!txPage.first}"
               th:href="@{/dashboard(page=${txPage.number - 1})}" class="page-btn">&#8249;</a>
            <span th:if="${txPage.first}" class="page-btn disabled">&#8249;</span>

            <th:block th:each="i : ${#numbers.sequence(0, txPage.totalPages - 1)}">
                <a th:href="@{/dashboard(page=${i})}"
                   th:text="${i + 1}"
                   th:class="${i == txPage.number} ? 'page-btn active' : 'page-btn'"></a>
            </th:block>

            <a th:if="${!txPage.last}"
               th:href="@{/dashboard(page=${txPage.number + 1})}" class="page-btn">&#8250;</a>
            <span th:if="${txPage.last}" class="page-btn disabled">&#8250;</span>
        </div>
    </div>
</main>

</body>
</html>
