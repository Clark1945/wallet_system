<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Wallet System Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 360px; }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8e8; color: #27ae60; }
        label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: 1rem; margin-bottom: 1rem;
        }
        button { width: 100%; padding: .75rem; background: #4f46e5; color: #fff;
            border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4338ca; }
        p { text-align: center; margin-top: 1rem; font-size: .9rem; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="#{login.title}">Wallet System Login</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form method="post" th:action="@{/login}">
        <label for="email" th:text="#{login.email}">Email</label>
        <input type="email" id="email" name="email" required autofocus/>

        <label for="password" th:text="#{login.password}">Password</label>
        <input type="password" id="password" name="password" required/>

        <button type="submit" th:text="#{login.submit}">Login</button>
    </form>
    <p>
        <span th:text="#{login.register.prompt}">Don't have an account?</span>
        <a th:href="@{/register}" th:text="#{login.register.link}">Register</a>
    </p>
</div>
</body>
</html>
