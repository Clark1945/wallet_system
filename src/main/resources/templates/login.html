<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Wallet System Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 360px; }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
        .alert-error { background: #fde8e8; color: #c0392b; }
        .alert-success { background: #e8f8e8; color: #27ae60; }
        label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
            border-radius: 4px; font-size: 1rem; margin-bottom: 1rem;
        }
        button { width: 100%; padding: .75rem; background: #4f46e5; color: #fff;
            border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4338ca; }
        .divider { display: flex; align-items: center; gap: .5rem; margin: 1rem 0; color: #aaa; font-size: .85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: .6rem;
            width: 100%; padding: .7rem; background: #fff; color: #333; border: 1px solid #ccc;
            border-radius: 4px; font-size: .95rem; text-decoration: none; cursor: pointer; }
        .google-btn:hover { background: #f5f5f5; }
        p { text-align: center; margin-top: 1rem; font-size: .9rem; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="#{login.title}">Wallet System Login</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form method="post" th:action="@{/login}">
        <label for="email" th:text="#{login.email}">Email</label>
        <input type="email" id="email" name="email" required autofocus/>

        <label for="password" th:text="#{login.password}">Password</label>
        <input type="password" id="password" name="password" required/>

        <button type="submit" th:text="#{login.submit}">Login</button>
        <p style="text-align:right; margin-top:.5rem; font-size:.85rem;">
            <a th:href="@{/forgot-password}" th:text="#{login.forgot.link}">Forgot password?</a>
        </p>
    </form>
    <div class="divider">or</div>
    <a href="/oauth2/authorization/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.7 0 6.8 5.4 3 13.3l7.8 6C12.6 13 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.8 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.3-5.9z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-4.1-13.2-9.7l-8.3 5.9C6.8 42.6 14.7 48 24 48z"/></svg>
        Sign in with Google
    </a>
    <p>
        <span th:text="#{login.register.prompt}">Don't have an account?</span>
        <a th:href="@{/register}" th:text="#{login.register.link}">Register</a>
    </p>
</div>
</body>
</html>
