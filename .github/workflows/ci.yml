name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-wallet-system:
    name: wallet_system tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet_system

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wallet-system-surefire-reports
          path: wallet_system/target/surefire-reports/

  test-payment-service:
    name: payment-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-surefire-reports
          path: payment-service/target/surefire-reports/

  test-email-service:
    name: email-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: email-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: email-service-surefire-reports
          path: email-service/target/surefire-reports/

  test-mock-bank:
    name: mock-bank tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock-bank

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test

  sonarcloud:
    name: SonarCloud analysis
    needs: [test-wallet-system, test-payment-service, test-email-service]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet_system

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for blame / new-code detection

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=Clark1945_wallet_system \
            -Dsonar.organization=clark1945 \
            -Dsonar.token=$SONAR_TOKEN
