name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-wallet-system:
    name: wallet_system tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallet_system

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wallet-system-surefire-reports
          path: wallet_system/target/surefire-reports/

  test-mock-bank:
    name: mock-bank tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock-bank

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test
