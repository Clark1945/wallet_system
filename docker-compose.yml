services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-bank:
    build:
      context: ./mock-bank
    ports:
      - "8081:8081"
    environment:
      WITHDRAW_WEBHOOK_SECRET: ${WITHDRAW_WEBHOOK_SECRET}
    volumes:
      - mock_bank_logs:/app/logs

  app:
    build:
      context: ./wallet_system
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis
      # mock-bank.url → wallet app calls this to initiate withdrawals
      MOCK_BANK_URL: http://mock-bank:8081
      # app.base-url → embedded in the callbackUrl sent to mock-bank
      APP_BASE_URL: http://app:8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      WITHDRAW_WEBHOOK_SECRET: ${WITHDRAW_WEBHOOK_SECRET}
      # payment-service integration — must be browser-accessible (localhost), not internal Docker hostname
      PAYMENT_SERVICE_BASE_URL: http://localhost:8082
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      # RabbitMQ — email notifications published here, consumed by email-service
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    volumes:
      - uploads:/app/uploads
      - app_logs:/app/logs
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-bank:
        condition: service_started
      payment-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8082:8082"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYMENT_MERCHANT_ID: ${PAYMENT_MERCHANT_ID}
      PAYMENT_SERVICE_ID: ${PAYMENT_SERVICE_ID}
      PAYMENT_HASH_KEY: ${PAYMENT_HASH_KEY}
      SP_PAYMENT_REDIRECT_URL: ${SP_PAYMENT_REDIRECT_URL}
      WALLET_SERVICE_BASE_URL: http://app:8080          # container-to-container API calls
      WALLET_SERVICE_PUBLIC_URL: http://localhost:8080  # browser redirect after payment
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./wallet_system/observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./wallet_system/observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - app_logs:/logs/wallet-system:ro
      - mock_bank_logs:/logs/mock-bank:ro
    depends_on:
      - loki
      - app
      - mock-bank

  email-service:
    build:
      context: ./email-service
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./wallet_system/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres_data:
  uploads:
  app_logs:
  mock_bank_logs:
  loki_data:
  grafana_data:
